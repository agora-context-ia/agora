name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" DEPLOY_BRANCH="$DEPLOY_BRANCH" 'bash -s' <<'EOF'
          set -euo pipefail
          cd ~/agora
          git fetch origin
          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only
          docker compose --env-file deploy/.env.production -f deploy/docker-compose.production.yml up -d --build
          docker compose --env-file deploy/.env.production -f deploy/docker-compose.production.yml ps
          EOF
