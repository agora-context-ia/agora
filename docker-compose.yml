services:
  # Postgres 18 con pgvector preinstalado (necesario para ai.embeddings).
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      # PG18: el mount va en /var/lib/postgresql (no /data); la imagen crea
      # el subdirectorio de datos ahí (permite pg_upgrade --link a futuro).
      - postgres_data:/var/lib/postgresql

  # De momento solo se usa para tener el contenedor levantado con clave de
  # acceso. Sin persistencia ni configuración adicional todavía.
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    ports:
      - '${REDIS_PORT}:6379'

  # Servidor de embeddings local. Modelos persistidos en volumen (pesan GB).
  # Descarga inicial (una vez): docker compose exec ollama ollama pull nomic-embed-text
  ollama:
    image: ollama/ollama:latest
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - ollama_models:/root/.ollama

  backend:
    build: ./apps/backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      - postgres
      - redis
      - ollama

  frontend:
    build: ./apps/frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_models:
  backend_uploads:
