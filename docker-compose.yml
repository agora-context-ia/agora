services:
  # Postgres 18 con pgvector preinstalado (necesario para ai.embeddings).
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      # PG18: el mount va en /var/lib/postgresql (no /data); la imagen crea
      # el subdirectorio de datos ahí (permite pg_upgrade --link a futuro).
      - postgres_data:/var/lib/postgresql

  # De momento solo se usa para tener el contenedor levantado con clave de
  # acceso. Sin persistencia ni configuración adicional todavía.
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    ports:
      - '${REDIS_PORT}:6379'

  # Servidor de embeddings local. Modelos persistidos en volumen (pesan GB).
  # El modelo se descarga automáticamente vía el sidecar `ollama-init`.
  ollama:
    image: ollama/ollama:latest
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      # `ollama list` responde 0 solo cuando el servidor ya acepta peticiones.
      test: ['CMD', 'ollama', 'list']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Sidecar de un solo uso: espera a que `ollama` esté sano y garantiza que
  # el modelo de embeddings esté descargado (idempotente). Corre al hacer
  # `docker compose up` y termina; no reinicia.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # La CLI apunta al servidor `ollama`; la descarga se guarda en su volumen.
      OLLAMA_HOST: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
    volumes:
      - ./scripts/pull-ollama-model.sh:/pull-ollama-model.sh:ro
    entrypoint: ['/bin/sh', '/pull-ollama-model.sh']
    restart: 'no'

  backend:
    build: ./apps/backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      - postgres
      - redis
      - ollama

  frontend:
    build: ./apps/frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_models:
  backend_uploads:
